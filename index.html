<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miss u Amal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&amp;family=Great+Vibes&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Dancing Script', cursive;
            background-image: url('https://www.image2url.com/r2/default/images/1776623575599-915637ad-a3aa-48f2-987a-76ffcc2f89df.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.3)), linear-gradient(rgba(255, 182, 193, 0.4), rgba(255, 105, 180, 0.2));
            backdrop-filter: blur(2px) brightness(1.05);
            z-index: 1;
        }
        /* Dreamy bokeh lights */
        
        .bokeh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .bokeh::before,
        .bokeh::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.6) 0%, rgba(255, 105, 180, 0.3) 50%, transparent 70%);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.4);
            animation: floatBokeh 20s infinite linear;
        }
        
        .bokeh::before {
            width: 100px;
            height: 100px;
            top: 20%;
            left: 10%;
            animation-delay: -10s;
        }
        
        .bokeh::after {
            width: 60px;
            height: 60px;
            top: 60%;
            right: 15%;
            animation-duration: 15s;
        }
        
        @keyframes floatBokeh {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.3;
            }
            100% {
                transform: translateY(0) rotate(360deg);
                opacity: 0.6;
            }
        }
        /* Falling rose petals */
        
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        
        .petal {
            position: absolute;
            width: 20px;
            height: 30px;
            background: radial-gradient(ellipse at 30% 30%, #ffb6c1, #ff69b4);
            border-radius: 50% 0 50% 0 / 60% 60% 40% 40%;
            opacity: 0.8;
            animation: fall linear infinite;
            filter: drop-shadow(0 4px 12px rgba(255, 105, 180, 0.4));
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        /* Main content */
        
        .content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            padding: 40px 20px;
        }
        
        .main-text {
            font-size: clamp(3.5rem, 12vw, 8rem);
            color: #ff69b4;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6), 0 4px 20px rgba(0, 0, 0, 0.2), 0 0 40px rgba(255, 182, 193, 0.4);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 30px;
            transform: perspective(400px) rotateX(10deg);
            text-align: center;
        }
        
        .sub-text {
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: #ff69b4;
            font-weight: 600;
            margin-bottom: 60px;
            text-shadow: 0 2px 10px rgba(255, 105, 180, 0.5);
            position: relative;
        }
        
        .sub-text::before,
        .sub-text::after {
            content: '🌹';
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.7;
        }
        
        .sub-text::before {
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .sub-text::after {
            right: -40px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .signature {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #ff69b4;
            text-shadow: 0 2px 10px rgba(255, 105, 180, 0.4);
            transform: rotate(-5deg);
            z-index: 15;
        }
        /* Content positioning with z-index */
        
        .quote,
        .character,
        .text {
            position: relative;
            z-index: 10;
        }
        /* Responsive */
        
        @media (max-width: 768px) {
            .content {
                padding: 20px 10px;
            }
            .signature {
                bottom: 20px;
                right: 20px;
            }
            .sub-text::before,
            .sub-text::after {
                font-size: 1rem;
            }
        }
        /* Subtle parallax for petals */
        
        @media (prefers-reduced-motion: no-preference) {
            .petals {
                animation: windSway 20s infinite ease-in-out;
            }
        }
    </style>
</head>

<body>
    <div class="bokeh"></div>
    <div class="petals" id="petals"></div>

    <div class="content">
        <h1 class="main-text">I miss u Amal</h1>
        <p class="sub-text">I tried to forget you… but you stayed in everything</p>
        <div class="signature">Marwane</div>
    </div>

    <script>
        // Generate falling petals
        function createPetals() {
            const petalsContainer = document.getElementById('petals');
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.style.left = Math.random() * 100 + '%';
                    petal.style.animationDuration = (Math.random() * 8 + 8) + 's';
                    petal.style.animationDelay = Math.random() * 5 + 's';
                    petalsContainer.appendChild(petal);

                    setTimeout(() => petal.remove(), 16000);
                }, i * 200);
            }
        }

        // Continuous petal generation
        setInterval(createPetals, 5000);
        createPetals(); // Initial burst

        // Subtle background sway
        document.addEventListener('mousemove', (e) => {
            const petalsContainer = document.getElementById('petals');
            const swayX = (e.clientX / window.innerWidth - 0.5) * 10;
            const swayY = (e.clientY / window.innerHeight - 0.5) * 10;
            petalsContainer.style.transform = `translate(${swayX}px, ${swayY}px)`;
        });
    </script>
</body>

</html>
